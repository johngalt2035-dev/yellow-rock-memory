# Yellow Rock — Full Stack Docker Deployment
# Protocol (templates) + Memory (daemon) + OpenClaw-ready
#
# Usage:
#   cp .env.example .env     # Configure your keys
#   docker compose up -d     # Start the stack
#   docker compose logs -f   # Watch logs

services:
  memory:
    build: .
    container_name: yellow-rock-memory
    restart: unless-stopped
    ports:
      - "127.0.0.1:9077:9077"
    volumes:
      - yrm-data:/data
    environment:
      - GRM_API_KEY=${GRM_API_KEY:?Set GRM_API_KEY in .env}
      - GRM_PRINCIPAL_ID=${GRM_PRINCIPAL_ID:-principal}
      - RUST_LOG=${RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "yellow-rock-memory", "--db", "/data/yellow-rock-memory.db", "stats"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  yrm-data:
    driver: local
